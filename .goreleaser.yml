version: 2

project_name: newrelic-cli

before:
  hooks:
    # a mutating tidy must fail the release, not build from a dirty tree
    - sh -c "go mod tidy && git diff --exit-code go.mod go.sum"

builds:
  # INT-448: darwin builds with CGO so 99designs/keyring's Keychain backend
  # (//go:build darwin && cgo) is compiled in; without it credstore fails
  # closed on macOS. linux/windows stay CGO-off static (their keyring
  # backends are pure Go; cgo there would regress glibc portability).
  # Split is by GOOS only — both darwin amd64 and arm64 are still produced.
  - id: nrq-darwin
    main: ./cmd/nrq
    binary: nrq
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: darwin
        goarch: amd64
        goamd64: v1
        env:
          - CGO_ENABLED=1
          - "CC=xcrun clang -arch x86_64"
      - goos: darwin
        goarch: arm64
        goarm64: v8.0
        env:
          - CGO_ENABLED=1
          - "CC=xcrun clang -arch arm64"
    ldflags:
      - -s -w
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.Version={{.Version}}
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.Commit={{.Commit}}
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.BuildDate={{.Date}}
  - id: nrq-unix-win
    main: ./cmd/nrq
    binary: nrq
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.Version={{.Version}}
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.Commit={{.Commit}}
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.BuildDate={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "nrq_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

# Linux packages (.deb and .rpm)
nfpms:
  - id: nrq
    # deb/rpm are linux-only: pull the static CGO-off linux build, never
    # darwin/windows. `ids` (the v2 build-id filter) — `builds` is deprecated
    # and fails `goreleaser check`.
    ids:
      - nrq-unix-win
    package_name: nrq
    vendor: Open CLI Collective
    homepage: https://github.com/open-cli-collective/newrelic-cli
    maintainer: Open CLI Collective <https://github.com/open-cli-collective>
    description: Command-line interface for New Relic
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/licenses/nrq/LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Canonical Homebrew cask. skip_upload: true → goreleaser RENDERS the cask into
# dist/ but does NOT push it; the reusable release workflow's homebrew-alias step
# is the single atomic writer that commits the canonical cask + the newrelic-cli
# alias to the tap in one push. No `token:` here — the tap token belongs only to
# that alias job, and skip_upload needs none. goreleaser renders both on_macos and
# on_linux blocks from the build matrix; kept as-is (matching the prior hand-rolled
# cask, which also had on_linux — Linuxbrew users), per cli-common distribution.md
# §3 (goreleaser owns the canonical cask). Replaces BOTH the heredoc Casks/nrq.rb
# and the deprecated Formula/newrelic-cli.rb regeneration.
homebrew_casks:
  - name: nrq
    binaries: [nrq]
    skip_upload: true
    repository:
      owner: open-cli-collective
      name: homebrew-tap
    homepage: https://github.com/open-cli-collective/newrelic-cli
    description: "Command-line interface for New Relic"
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/nrq"]
    caveats: |
      To configure nrq, run:
        nrq init

      Your API key is stored in the OS keyring (Keychain on macOS,
      Credential Manager on Windows, Secret Service on Linux).
      It is never written to a plaintext file.

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat.*:.*$"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix.*:.*$"
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: open-cli-collective
    name: newrelic-cli
  # idempotent re-runs: a retried release overwrites the same assets instead of
  # erroring on "asset already exists" (release-preflight hard-requires this).
  replace_existing_artifacts: true
