name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    # INT-448: darwin must build with cgo (Keychain backend). cgo+darwin
    # cannot cross-compile from Linux, so this job runs on macOS. Pinned
    # image (not the moving macos-latest label) for a reproducible release.
    # The Homebrew tap step is inlined here (not a separate job) because it
    # needs the dist/ artifacts produced in this job.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          install-only: true

      - name: GoReleaser check
        run: goreleaser check

      - name: Build (snapshot, no publish)
        run: goreleaser release --snapshot --clean

      # INT-448 pre-publish gate: prove the darwin binaries actually carry
      # the Keychain backend BEFORE anything is published. A CGO_ENABLED=0
      # darwin build links no Security.framework and fails closed at
      # runtime; this gate makes that impossible to ship silently.
      - name: Pre-publish gate — darwin Keychain backend present
        run: |
          set -euo pipefail
          art=dist/artifacts.json
          arm_bin=$(jq -r '.[]|select(.type=="Binary" and .goos=="darwin" and .goarch=="arm64")|.path' "$art")
          amd_bin=$(jq -r '.[]|select(.type=="Binary" and .goos=="darwin" and .goarch=="amd64")|.path' "$art")
          [ -n "$arm_bin" ] && [ -n "$amd_bin" ] || { echo "missing a darwin binary in artifacts.json"; exit 1; }
          # darwin archives: exactly one per arch, no duplicate names
          tot=$(jq '[.[]|select(.type=="Archive" and .goos=="darwin")|.name]|length' "$art")
          uniq=$(jq '[.[]|select(.type=="Archive" and .goos=="darwin")|.name]|unique|length' "$art")
          [ "$tot" = "$uniq" ] || { echo "duplicate darwin archive names"; exit 1; }
          [ "$(jq '[.[]|select(.type=="Archive" and .goos=="darwin" and .goarch=="arm64")]|length' "$art")" = 1 ] || { echo "expected exactly one darwin/arm64 archive"; exit 1; }
          [ "$(jq '[.[]|select(.type=="Archive" and .goos=="darwin" and .goarch=="amd64")]|length' "$art")" = 1 ] || { echo "expected exactly one darwin/amd64 archive"; exit 1; }
          # Mach-O arch sanity (both slices)
          file "$arm_bin" | grep -q 'arm64'  || { echo "arm64 binary is not arm64 Mach-O";  exit 1; }
          file "$amd_bin" | grep -q 'x86_64' || { echo "amd64 binary is not x86_64 Mach-O"; exit 1; }
          lipo -archs "$arm_bin" | grep -qw arm64  || { echo "lipo: arm64 slice missing";  exit 1; }
          lipo -archs "$amd_bin" | grep -qw x86_64 || { echo "lipo: x86_64 slice missing"; exit 1; }
          # amd64 cannot run on the arm64 runner: assert Security.framework
          # is linked. CGO_ENABLED=0 omits it entirely, so its presence is a
          # sound *necessary* cgo signal for the slice we can't execute.
          otool -L "$amd_bin" | grep -q '/System/Library/Frameworks/Security.framework' \
            || { echo "amd64 binary not linked against Security.framework (cgo missing)"; exit 1; }
          # arm64 authoritative functional check: with no backend override
          # and a seeded config, credstore must auto-select the Keychain.
          tmp=$(mktemp -d)
          mkdir -p "$tmp/xdg/newrelic-cli"
          printf 'credential_ref: newrelic-cli/default\n' > "$tmp/xdg/newrelic-cli/config.yml"
          # `config show --json` (the §2 diagnostics carve-out flag), not the
          # global `--output json` — #110 restricted `--output` to table/plain.
          out=$(env -u NEWRELIC_CLI_KEYRING_BACKEND HOME="$tmp" XDG_CONFIG_HOME="$tmp/xdg" "$arm_bin" config show --json)
          echo "$out"
          b=$(echo "$out" | jq -r '.backend'); s=$(echo "$out" | jq -r '.backend_source'); r=$(echo "$out" | jq -r '.credential_ref')
          [ "$b" = "keychain" ] && [ "$s" = "auto" ] && [ "$r" = "newrelic-cli/default" ] \
            || { echo "GATE FAIL: backend=$b source=$s ref=$r (want keychain/auto/newrelic-cli/default)"; exit 1; }
          echo "GATE OK: darwin/arm64 backend=keychain source=auto; darwin/amd64 Security.framework linked"

      - name: Release notes
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/release-notes.md" <<'EOF'
          ### macOS Keychain storage restored

          Builds since the credential-store migration were compiled without
          cgo and failed closed on macOS (no Keychain backend). This release
          builds the darwin binaries with cgo enabled, restoring native
          macOS Keychain storage. Upgrade and re-run your normal commands;
          no other action is required.
          EOF

      - name: Release (publish)
        run: goreleaser release --clean --release-notes="$RUNNER_TEMP/release-notes.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release notes published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          body=$(gh release view "${{ github.ref_name }}" --repo "$GITHUB_REPOSITORY" --json body -q .body)
          if ! printf '%s' "$body" | grep -q 'macOS Keychain'; then
            gh release edit "${{ github.ref_name }}" --repo "$GITHUB_REPOSITORY" --notes-file "$RUNNER_TEMP/release-notes.md"
          fi

      # TAP_GITHUB_TOKEN (a PAT) is required to push to the open-cli-collective/homebrew-tap
      # repository. The default GITHUB_TOKEN only has access to this repository.
      # INT-448: this step runs on macos-15 (moved with the goreleaser job).
      # BSD sed (macOS) requires a backup-suffix with -i; use perl -pi -e
      # instead of sed -i for cross-platform compatibility.
      - name: Update Homebrew Tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"

          DARWIN_ARM64_SHA=$(grep "_darwin_arm64.tar.gz" dist/checksums.txt | cut -d' ' -f1)
          DARWIN_AMD64_SHA=$(grep "_darwin_amd64.tar.gz" dist/checksums.txt | cut -d' ' -f1)
          LINUX_ARM64_SHA=$(grep "_linux_arm64.tar.gz" dist/checksums.txt | cut -d' ' -f1)
          LINUX_AMD64_SHA=$(grep "_linux_amd64.tar.gz" dist/checksums.txt | cut -d' ' -f1)

          # Fail loudly rather than write cask/formula files with empty sha256 if
          # an archive was renamed/missing (INT-448: blast radius of the build split).
          for pair in \
            "darwin_arm64:$DARWIN_ARM64_SHA" "darwin_amd64:$DARWIN_AMD64_SHA" \
            "linux_arm64:$LINUX_ARM64_SHA" "linux_amd64:$LINUX_AMD64_SHA"; do
            name="${pair%%:*}"; sha="${pair#*:}"
            if [ -z "$sha" ]; then echo "empty checksum for ${name} archive"; exit 1; fi
          done

          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/open-cli-collective/homebrew-tap.git
          cd homebrew-tap

          mkdir -p Formula Casks

          cat > Formula/newrelic-cli.rb << 'FORMULAEOF'
          class NewrelicCli < Formula
            desc "Command-line interface for New Relic"
            homepage "https://github.com/open-cli-collective/newrelic-cli"
            license "MIT"
            version "VERSION_PLACEHOLDER"

            on_macos do
              on_arm do
                url "https://github.com/open-cli-collective/newrelic-cli/releases/download/v#{version}/nrq_v#{version}_darwin_arm64.tar.gz"
                sha256 "DARWIN_ARM64_PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/open-cli-collective/newrelic-cli/releases/download/v#{version}/nrq_v#{version}_darwin_amd64.tar.gz"
                sha256 "DARWIN_AMD64_PLACEHOLDER"
              end
            end

            def install
              bin.install "nrq"
            end

            def caveats
              <<~EOS
                To configure nrq, run:
                  nrq config set-api-key
                  nrq config set-account-id <your-account-id>

                Or set environment variables:
                  NEWRELIC_API_KEY
                  NEWRELIC_ACCOUNT_ID
                  NEWRELIC_REGION (US or EU)
              EOS
            end

            test do
              assert_match "nrq", shell_output("#{bin}/nrq --help")
            end
          end
          FORMULAEOF

          perl -pi -e "s/VERSION_PLACEHOLDER/${VERSION_NUM}/g" Formula/newrelic-cli.rb
          perl -pi -e "s/DARWIN_ARM64_PLACEHOLDER/${DARWIN_ARM64_SHA}/g" Formula/newrelic-cli.rb
          perl -pi -e "s/DARWIN_AMD64_PLACEHOLDER/${DARWIN_AMD64_SHA}/g" Formula/newrelic-cli.rb

          # Also update the nrq cask (alias for users who install via `brew install nrq`)
          cat > Casks/nrq.rb << 'CASKEOF'
          cask "nrq" do
            name "nrq"
            desc "Command-line interface for New Relic"
            homepage "https://github.com/open-cli-collective/newrelic-cli"
            version "VERSION_PLACEHOLDER"

            binary "nrq"

            on_macos do
              on_arm do
                url "https://github.com/open-cli-collective/newrelic-cli/releases/download/v#{version}/nrq_v#{version}_darwin_arm64.tar.gz"
                sha256 "DARWIN_ARM64_PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/open-cli-collective/newrelic-cli/releases/download/v#{version}/nrq_v#{version}_darwin_amd64.tar.gz"
                sha256 "DARWIN_AMD64_PLACEHOLDER"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/open-cli-collective/newrelic-cli/releases/download/v#{version}/nrq_v#{version}_linux_arm64.tar.gz"
                sha256 "LINUX_ARM64_PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/open-cli-collective/newrelic-cli/releases/download/v#{version}/nrq_v#{version}_linux_amd64.tar.gz"
                sha256 "LINUX_AMD64_PLACEHOLDER"
              end
            end

            postflight do
              system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/nrq"]
            end

            caveats <<~EOS
              nrq has been installed.

              To configure, run:
                nrq config set-api-key
                nrq config set-account-id

              Or set environment variables:
                export NEWRELIC_API_KEY=NRAK-xxx
                export NEWRELIC_ACCOUNT_ID=123456
            EOS
          end
          CASKEOF

          perl -pi -e "s/VERSION_PLACEHOLDER/${VERSION_NUM}/g" Casks/nrq.rb
          perl -pi -e "s/DARWIN_ARM64_PLACEHOLDER/${DARWIN_ARM64_SHA}/g" Casks/nrq.rb
          perl -pi -e "s/DARWIN_AMD64_PLACEHOLDER/${DARWIN_AMD64_SHA}/g" Casks/nrq.rb
          perl -pi -e "s/LINUX_ARM64_PLACEHOLDER/${LINUX_ARM64_SHA}/g" Casks/nrq.rb
          perl -pi -e "s/LINUX_AMD64_PLACEHOLDER/${LINUX_AMD64_SHA}/g" Casks/nrq.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update newrelic-cli to ${VERSION_NUM}"
          git push

  chocolatey:
    needs: goreleaser
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get checksums from release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.ref_name }}" --pattern "checksums.txt" --dir .

          $checksums = Get-Content checksums.txt
          $x64Hash = ($checksums | Select-String "windows_amd64.zip").Line.Split()[0]
          $arm64Hash = ($checksums | Select-String "windows_arm64.zip").Line.Split()[0]

          Write-Host "x64 SHA256: $x64Hash"
          Write-Host "arm64 SHA256: $arm64Hash"

          echo "X64_HASH=$x64Hash" >> $env:GITHUB_ENV
          echo "ARM64_HASH=$arm64Hash" >> $env:GITHUB_ENV

      - name: Update version and checksums
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')

          # Update version in nuspec
          $nuspec = 'packaging/chocolatey/nrq-cli.nuspec'
          (Get-Content $nuspec) -replace '<version>0.0.0</version>', "<version>$version</version>" | Set-Content $nuspec
          Write-Host "Updated nuspec to version $version"

          # Inject checksums into install script
          $script = 'packaging/chocolatey/tools/chocolateyInstall.ps1'
          $content = Get-Content $script -Raw
          $content = $content -replace 'CHECKSUM_AMD64_PLACEHOLDER', $env:X64_HASH
          $content = $content -replace 'CHECKSUM_ARM64_PLACEHOLDER', $env:ARM64_HASH
          Set-Content $script $content
          Write-Host "Injected checksums into install script"

      - name: Pack Chocolatey package
        shell: pwsh
        run: |
          cd packaging/chocolatey
          choco pack
          Get-ChildItem *.nupkg

      - name: Push to Chocolatey
        shell: pwsh
        run: |
          cd packaging/chocolatey
          choco push (Get-ChildItem *.nupkg).Name --source https://push.chocolatey.org/ --key ${{ secrets.CHOCOLATEY_API_KEY }}

  winget:
    needs: goreleaser
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Check if manifest exists in winget-pkgs
        id: check-manifest
        shell: pwsh
        run: |
          $response = Invoke-WebRequest -Uri "https://api.github.com/repos/microsoft/winget-pkgs/contents/manifests/o/OpenCLICollective/newrelic-cli" -Method Head -SkipHttpErrorCheck
          if ($response.StatusCode -eq 200) {
            Write-Host "Manifest exists - will use wingetcreate update"
            echo "exists=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Manifest does not exist - will use wingetcreate new"
            echo "exists=false" >> $env:GITHUB_OUTPUT
          }

      - name: Get checksums from release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          gh release download "${{ github.ref_name }}" --pattern "checksums.txt" --dir .

          $checksums = Get-Content checksums.txt
          $x64Hash = ($checksums | Select-String "windows_amd64.zip").Line.Split()[0]
          $arm64Hash = ($checksums | Select-String "windows_arm64.zip").Line.Split()[0]

          Write-Host "x64 SHA256: $x64Hash"
          Write-Host "arm64 SHA256: $arm64Hash"

          echo "X64_HASH=$x64Hash" >> $env:GITHUB_ENV
          echo "ARM64_HASH=$arm64Hash" >> $env:GITHUB_ENV

      - name: Update manifest (existing package)
        if: steps.check-manifest.outputs.exists == 'true'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $x64 = "https://github.com/open-cli-collective/newrelic-cli/releases/download/${{ github.ref_name }}/nrq_v${version}_windows_amd64.zip"
          $arm64 = "https://github.com/open-cli-collective/newrelic-cli/releases/download/${{ github.ref_name }}/nrq_v${version}_windows_arm64.zip"

          Write-Host "Updating existing manifest to version $version"
          ./wingetcreate.exe update OpenCLICollective.newrelic-cli --version $version --urls $x64 $arm64 --submit --token ${{ secrets.WINGET_GITHUB_TOKEN }}

      - name: Create manifest (new package)
        if: steps.check-manifest.outputs.exists == 'false'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $manifestDir = "manifests"
          New-Item -ItemType Directory -Path $manifestDir -Force | Out-Null

          # Update version manifest
          $versionManifest = Get-Content "packaging/winget/OpenCLICollective.newrelic-cli.yaml" -Raw
          $versionManifest = $versionManifest -replace "0\.0\.0", $version
          Set-Content "$manifestDir/OpenCLICollective.newrelic-cli.yaml" $versionManifest

          # Update locale manifest
          $localeManifest = Get-Content "packaging/winget/OpenCLICollective.newrelic-cli.locale.en-US.yaml" -Raw
          $localeManifest = $localeManifest -replace "0\.0\.0", $version
          Set-Content "$manifestDir/OpenCLICollective.newrelic-cli.locale.en-US.yaml" $localeManifest

          # Update installer manifest with version and real checksums
          $installerManifest = Get-Content "packaging/winget/OpenCLICollective.newrelic-cli.installer.yaml" -Raw
          $installerManifest = $installerManifest -replace "0\.0\.0", $version
          # Use .NET regex for sequential replacement (PowerShell -replace doesn't support count)
          $regex = [regex]"0{64}"
          $installerManifest = $regex.Replace($installerManifest, $env:X64_HASH, 1)
          $installerManifest = $regex.Replace($installerManifest, $env:ARM64_HASH, 1)
          Set-Content "$manifestDir/OpenCLICollective.newrelic-cli.installer.yaml" $installerManifest

          Write-Host "Generated manifests:"
          Get-ChildItem $manifestDir | ForEach-Object { Write-Host "  $_" }

          Write-Host "`nValidating manifests..."
          winget validate --manifest $manifestDir
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Manifest validation failed"
            exit 1
          }
          Write-Host "Validation passed!"

          Write-Host "`nSubmitting new package to Winget..."
          ./wingetcreate.exe submit --token ${{ secrets.WINGET_GITHUB_TOKEN }} $manifestDir

  snap:
    needs: goreleaser
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Set snap version from tag
        run: |
          VERSION="${TAG#v}"
          sed -i "s/^version: git$/version: '${VERSION}'/" snap/snapcraft.yaml
          echo "Snap version: ${VERSION}"
          grep '^version:' snap/snapcraft.yaml

      - name: Build snap
        uses: snapcore/action-build@v1
        id: build

      - name: Publish to Snapcraft Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable

  linux-packages:
    needs: goreleaser
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Trigger linux-packages repo update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.LINUX_PACKAGES_DISPATCH_TOKEN }}
          repository: open-cli-collective/linux-packages
          event-type: package-release
          client-payload: |-
            {
              "package": "nrq",
              "version": "${{ github.ref_name }}",
              "repo": "open-cli-collective/newrelic-cli"
            }
