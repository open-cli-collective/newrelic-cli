version: 2

project_name: newrelic-cli

builds:
  # INT-448: darwin builds with CGO so 99designs/keyring's Keychain backend
  # (//go:build darwin && cgo) is compiled in; without it credstore fails
  # closed on macOS. linux/windows stay CGO-off static (their keyring
  # backends are pure Go; cgo there would regress glibc portability).
  # Split is by GOOS only — both darwin amd64 and arm64 are still produced.
  - id: nrq-darwin
    main: ./cmd/nrq
    binary: nrq
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: darwin
        goarch: amd64
        goamd64: v1
        env:
          - CGO_ENABLED=1
          - "CC=xcrun clang -arch x86_64"
      - goos: darwin
        goarch: arm64
        goarm64: v8.0
        env:
          - CGO_ENABLED=1
          - "CC=xcrun clang -arch arm64"
    ldflags:
      - -s -w
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.Version={{.Version}}
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.Commit={{.Commit}}
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.BuildDate={{.Date}}
  # linux must ALSO build with CGO: onepassword-sdk-go (transitive via
  # cli-common) has no pure-Go path on linux — its client_builder_no_cgo.go
  # (//go:build !cgo && (darwin || linux)) is a compile-error sentinel, so the
  # old CGO-off linux build broke every release since v1.0.39. We cross-compile
  # CGO from the macOS runner with zig (installed in release.yml), targeting
  # musl so the binaries stay STATIC + portable — better than the dynamic-glibc
  # concern the original CGO-off split was avoiding. Windows is unaffected: the
  # SDK's client_builder_cgo.go builds under `cgo || windows`, so CGO-off
  # windows still compiles — it keeps its own static CGO-off build below.
  - id: nrq-linux
    main: ./cmd/nrq
    binary: nrq
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - "CC=zig cc -target x86_64-linux-musl"
          - "CXX=zig c++ -target x86_64-linux-musl"
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - "CC=zig cc -target aarch64-linux-musl"
          - "CXX=zig c++ -target aarch64-linux-musl"
    ldflags:
      - -s -w
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.Version={{.Version}}
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.Commit={{.Commit}}
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.BuildDate={{.Date}}
  - id: nrq-windows
    main: ./cmd/nrq
    binary: nrq
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.Version={{.Version}}
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.Commit={{.Commit}}
      - -X github.com/open-cli-collective/newrelic-cli/internal/version.BuildDate={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "nrq_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

# Linux packages (.deb and .rpm)
nfpms:
  - id: nrq
    # deb/rpm are linux-only: pull the static linux build (now CGO+zig+musl),
    # never darwin/windows. `ids` (the v2 build-id filter) — `builds` is
    # deprecated and fails `goreleaser check`.
    ids:
      - nrq-linux
    package_name: nrq
    vendor: Open CLI Collective
    homepage: https://github.com/open-cli-collective/newrelic-cli
    maintainer: Open CLI Collective <https://github.com/open-cli-collective>
    description: Command-line interface for New Relic
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/licenses/nrq/LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat.*:.*$"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix.*:.*$"
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: open-cli-collective
    name: newrelic-cli
